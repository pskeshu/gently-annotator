host: 0.0.0.0   # listen on all interfaces — accessible from LAN at http://<host-ip>:8090/
port: 8090

# Each dataset has an ordered list of roots. The first one that exists is used,
# so the D: copy takes precedence once it finishes; nearline is the fallback.
datasets:
  Gently:
    schema: v1   # images/{session}/embryo_N_tNNNN[_TIMESTAMP].tif
    roots:
      - D:\Kesavan\latest\Kesavan\Gently
      - \\nearline.hhmi.org\shroff\shrofflab\Collaborators\Kesavan\Gently
  Gently2:
    schema: v2   # volumes/{session}/embryo_N_tNNNN.tif
    roots:
      - D:\Kesavan\latest\Kesavan\Gently2
      - \\nearline.hhmi.org\shroff\shrofflab\Collaborators\Kesavan\Gently2

stages:
  - early
  - bean
  - comma
  - 1.5fold
  - 2fold
  - pretzel
  - hatched

# Default voxel size [dz, dy, dx] in microns for diSPIM. Matches
# gently.core.imaging.projection_three_view: 1.0 um Z step, 6.5 um camera
# pixel / 40x SPIM objective = 0.1625 um in XY.
voxel_size_um: [1.0, 0.1625, 0.1625]

# In-memory LRU cache of normalized uint8 volumes (each ~26 MB after preprocess).
cache:
  max_volumes: 8

# On-disk cache of preprocessed sidecars. ~26 MB per timepoint, ~5 GB per
# fully-baked embryo. First-time fetches write here; later fetches mmap.
cache_root: D:\Kesavan\gently_annotator_cache

# Background pre-bake of all timepoints when an embryo is selected.
prebake:
  max_workers: 4
